# CCI Credentials Secrets for Namespaces
# Based on Huawei Cloud CCI 2.0 Secret documentation
# Reference: https://support.huaweicloud.com/intl/zh-cn/usermanual-cci2/cci_01_0035.html

---
# CCI Credentials Secret for data-ingest namespace
apiVersion: cci/v2
kind: Secret
metadata:
  name: cci-credentials
  namespace: data-ingest
  labels:
    app.kubernetes.io/name: cron-dispatcher
    app.kubernetes.io/managed-by: CronDispatcher
    cron-dispatcher.io/component: credentials
type: Opaque
data:
  # Base64 encoded Access Key ID
  # Use: echo -n "your_access_key" | base64
  # Example: echo -n "AKIAIOSFODNN7EXAMPLE" | base64
  access-key: ""
  
  # Base64 encoded Secret Access Key  
  # Use: echo -n "your_secret_key" | base64
  # Example: echo -n "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY" | base64
  secret-key: ""
  
  # Base64 encoded domain name
  # Use: echo -n "your_domain_name" | base64
  # Example: echo -n "your-domain" | base64
  domain-name: ""
  
  # Base64 encoded project name (optional)
  # Use: echo -n "af-south-1" | base64
  # If not provided, will use CCI_REGION value as default
  project-name: ""

---
# CCI Credentials Secret for cv-cd-generators namespace
apiVersion: cci/v2
kind: Secret
metadata:
  name: cci-credentials
  namespace: cv-cd-generators
  labels:
    app.kubernetes.io/name: cron-dispatcher
    app.kubernetes.io/managed-by: CronDispatcher
    cron-dispatcher.io/component: credentials
type: Opaque
data:
  # Base64 encoded Access Key ID
  # Use: echo -n "your_access_key" | base64
  # Example: echo -n "AKIAIOSFODNN7EXAMPLE" | base64
  access-key: ""
  
  # Base64 encoded Secret Access Key  
  # Use: echo -n "your_secret_key" | base64
  # Example: echo -n "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY" | base64
  secret-key: ""
  
  # Base64 encoded domain name
  # Use: echo -n "your_domain_name" | base64
  # Example: echo -n "your-domain" | base64
  domain-name: ""
  
  # Base64 encoded project name (optional)
  # Use: echo -n "af-south-1" | base64
  # If not provided, will use CCI_REGION value as default
  project-name: ""

---
# Instructions for Base64 encoding (as per Huawei Cloud documentation):
# 
# 1. Access Key encoding:
#    echo -n "your_actual_access_key" | base64
#
# 2. Secret Key encoding:
#    echo -n "your_actual_secret_key" | base64
#
# 3. Domain Name encoding:
#    echo -n "your_actual_domain_name" | base64
#
# 4. Project Name encoding (optional):
#    echo -n "af-south-1" | base64
#
# Example usage:
# root@ubuntu:~# echo -n "AKIAIOSFODNN7EXAMPLE" | base64
# QUtJQUlPU0ZPRE5ON0VYQU1QTEU=
#
# Security Notes:
# - Keep this file secure and do not commit actual credentials to version control
# - Use proper RBAC to restrict access to these Secrets
# - Consider using external secret management systems for production environments
# - Rotate credentials regularly
#
# Deployment:
# ccictl apply -f config/cci-credentials-secrets.yaml 