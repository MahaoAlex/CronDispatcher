kind: Deployment
apiVersion: cci/v2
metadata:
  name: cron-dispatcher
  namespace: cv-cd-generators  # Modify according to actual namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cron-dispatcher
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: cron-dispatcher
      annotations:  # Modify according to actual LTS stream config
        logconf.k8s.io/fluent-bit-log-type: lts
        logconfigs.logging.openvessel.io: '{"default-config":{"container_files":{"container-0":"stdout.log;/var/log/cron-dispatcher/*.log"},"regulation":"","lts-log-info":{"cc885264-61e5-4301-aad6-699c3fbf0a36":"e7b54433-3fd4-4a69-88c6-e73d17feb969"}}}'
        resource.cci.io/pod-size-specs: 1.00_2.0
    spec:
      containers:
      - name: default
        image: swr.af-south-1.myhuaweicloud.com/content-discovery/cron-dispatcher:latest  # Replace with actual image address
        resources:
          limits:
            cpu: '0'
            memory: '0'
          requests:
            cpu: '0'
            memory: '0'
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: CRON_TIMEZONE
          value: "UTC"  # Can be modified as needed, e.g., "Asia/Johannesburg"
        - name: GC_DRY_RUN
          value: "false"  # Set to "true" to enable dry run mode for garbage collection
        - name: GC_BATCH_SIZE
          value: "50"  # Number of Pods to delete per batch during garbage collection
        volumeMounts:
        - name: cron-templates
          mountPath: /etc/cron-templates
          readOnly: true
        - name: log-volume
          mountPath: /var/log/cron-dispatcher
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: cron-templates
        configMap:
          name: cron-templates
          optional: true
      - name: log-volume
        emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: Default
      securityContext: {}
      imagePullSecrets:
        - name: imagepull-secret
      schedulerName: default-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 100%
  progressDeadlineSeconds: 600