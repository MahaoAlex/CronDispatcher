apiVersion: apps/v1
kind: Deployment
metadata:
  name: cron-dispatcher
  namespace: default  # Modify according to actual namespace
  labels:
    app: cron-dispatcher
    version: v1.0.0
spec:
  replicas: 1  # Single replica deployment
  selector:
    matchLabels:
      app: cron-dispatcher
  template:
    metadata:
      labels:
        app: cron-dispatcher
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "false"  # Temporarily disable Prometheus monitoring
    spec:
      serviceAccountName: cron-dispatcher-sa
      containers:
      - name: cron-dispatcher
        image: cron-dispatcher:latest  # Replace with actual image address
        imagePullPolicy: Always
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: CRON_TIMEZONE
          value: "Africa/Johannesburg"  # Can be modified as needed, e.g., "Asia/Shanghai"
        - name: GC_DRY_RUN
          value: "false"  # Set to "true" to enable dry run mode for garbage collection
        - name: GC_BATCH_SIZE
          value: "50"  # Number of Pods to delete per batch during garbage collection
        - name: PYTHONUNBUFFERED
          value: "1"
        ports:
        - containerPort: 8080
          name: health
          protocol: TCP
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: cron-templates
          mountPath: /etc/cron-templates
          readOnly: true
        - name: log-volume
          mountPath: /var/log/cron-dispatcher
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          runAsNonRoot: false  # Requires root privileges to run crond
          runAsUser: 0
          capabilities:
            add:
            - SYS_TIME  # Time management permissions
            - SETUID    # Cron job permissions
            - SETGID    # Cron job permissions
      volumes:
      - name: cron-templates
        configMap:
          name: cron-templates
          optional: true
      - name: log-volume
        emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cron-dispatcher-sa
  namespace: default  # Modify according to actual namespace
  labels:
    app: cron-dispatcher
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cron-dispatcher-role
  namespace: default  # Modify according to actual namespace
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cron-dispatcher-rolebinding
  namespace: default  # Modify according to actual namespace
subjects:
- kind: ServiceAccount
  name: cron-dispatcher-sa
  namespace: default  # Modify according to actual namespace
roleRef:
  kind: Role
  name: cron-dispatcher-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Service
metadata:
  name: cron-dispatcher-service
  namespace: default  # Modify according to actual namespace
  labels:
    app: cron-dispatcher
spec:
  selector:
    app: cron-dispatcher
  ports:
  - name: health
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP 